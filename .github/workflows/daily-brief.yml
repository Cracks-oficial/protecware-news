name: CyberBrief - Daily News Scraper

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser
      
      - name: 🔍 Verificar archivos
        run: |
          ls -la
          echo "📂 Contenido del repositorio:"
          cat scraper.py | head -20 || echo "⚠️ scraper.py no encontrado"
      
      - name: 🤖 Ejecutar scraper
        run: |
          python scraper.py || echo "❌ El scraper falló, pero continuamos..."
      
      - name: 📤 Subir cambios a GitHub
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 Actualización automática de noticias"
          git push
